apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: depotest
  name: depotest
spec:
  replicas: 10
  selector:
    matchLabels:
      app: depotest
  template:
    metadata:
      labels:
        app: depotest
    spec:
      containers:
      - image: nginx
        name: nginx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
